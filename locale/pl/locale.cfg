[fluid-description]
maraxsis-saline-water=Płyn zawierający co najmniej 30 jednostek soli na 1000 jednostek wody. Umieść [entity=offshore-pump] w dowolnym miejscu na [planet=maraxsis], aby wydobywać wodę zasoloną.
maraxsis-brackish-water=Płyn zawierający co najmniej 1 jednostkę soli na 1000 jednostek wody. Może być poddana elektrolizie w celu uzyskania słodkiej wody.
maraxsis-atmosphere=Mieszanina gazów - tlenu i azotu. Płyn ten można wytworzyć za darmo w [entity=chemical-plant] na dowolnej planecie oprócz [planet=maraxsis].
maraxsis-supercritical-steam=Wysokoenergetyczna para, generowana w [entity=maraxsis-geothermal-generator] i zużywana w [entity=maraxsis-oversized-steam-turbine]. W przeciwieństwie do zwykłych płynów, nie może być przesyłana w [entity=pipe]. Zamiast tego może być przesyłana jedynie przez [entity=maraxsis-geothermal-generator], [entity=maraxsis-oversized-steam-turbine] oraz wszystkie warianty [entity=duct-small]. Para o wyższej temperaturze zapewnia więcej energii przy zużyciu.

