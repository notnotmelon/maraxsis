maraxsis-big-cliff-explosives=Ostateczna broń na ostatecznego wroga.\n[font=default-bold][color=255,230,192]Hej, czy to na pewno jest bezpieczne?[/color][/font]
maraxsis-salt-filter=Służy do odsalania wody pod wysokim ciśnieniem.
