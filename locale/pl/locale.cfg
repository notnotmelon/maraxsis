[tips-and-tricks-item-description]
maraxsis-briefing=[planet=maraxsis] to w pełni pokryty wodą świat bez ani jednej wyspy na całej jego powierzchni. Bez [entity=maraxsis-diesel-submarine] utoniesz w ciągu piętnastu minut. Większość maszyn, z wyjątkiem [entity=chemical-plant] oraz [entity=maraxsis-hydro-plant], nie jest przystosowana do pracy w ekstremalnych ciśnieniach i będzie działać tylko wewnątrz [entity=maraxsis-pressure-dome]. [fluid=maraxsis-saline-water] można wypompować, umieszczając [entity=offshore-pump] w dowolnym miejscu. Występują tu 3  biomy: równiny oceaniczne, rafa koralowa oraz rów oceaniczny. [fluid=lava] można znaleźć w rowie oceanicznym, jednak wiele innych materiałów, takich jak [fluid=maraxsis-atmosphere], [item=carbon-fiber] i [item=tungsten-plate], musi być sprowadzanych z innych planet. [entity=rocket-silo] nie może wystrzeliwać rakiet bez uprzedniego zbadania [technology=maraxsis-project-seadragon].
maraxsis-trench-exploration=Od czasu do czasu, podczas eksploracji Maraxsis można trafić na głęboką szczelinę w skorupie planety. Wejście do rowu oceanicznego to najniższy punkt na powierzchni [planet=maraxsis] i można je skutecznie zlokalizować, podróżując prostopadle do linii [entity=cliff-maraxsis]. Ta szczelina sięga tysiące kilometrów w głąb, aż na samo dno podwodnego rowu oceanicznego. Będąc nad [tile=maraxsis-trench-entrance], użyj __CONTROL__maraxsis-trench-submerge__ wewnątrz [item=maraxsis-diesel-submarine], aby się zanurzyć. Na dnie rowu oceanicznego panuje całkowita ciemność, a [item=night-vision-equipment] nie będzie tu działać. Poza wnętrzem [item=maraxsis-diesel-submarine] lub [item=maraxsis-nuclear-submarine] zostaniesz zmiażdżony w trzydzieści sekund. [entity=maraxsis-hydro-plant] zyskuje cztery dodatkowe gniazda na moduły w rowie oceanicznym. [fluid=lava] można pozyskiwać z kominów geotermalnych w rowie oceanicznym i przetwarzać na [fluid=molten-iron], [fluid=molten-copper] oraz [item=sulfur].
maraxsis-underwater-machines=[entity=chemical-plant] oraz [entity=maraxsis-hydro-plant] są szczelne i zaprojektowane do pracy pod ciśnieniem. Jednak wiele twoich maszyn nie zadziała pod wodą na [planet=maraxsis].\n\nZakazane maszyny w [planet=maraxsis-trench]:\n- [entity=rocket-silo], [entity=cargo-landing-pad], [entity=locomotive]\n\nMaszyny działające pod wodą:\n- [entity=sp-spidertron-dock], [entity=small-lamp]\n- [entity=chemical-plant], [entity=maraxsis-hydro-plant], [entity=maraxsis-conduit]\n- [entity=transport-belt], [entity=splitter], [entity=underground-belt]\n- [entity=steel-chest], [entity=active-provider-chest], [entity=passive-provider-chest], [entity=requester-chest], [entity=buffer-chest], [entity=storage-chest]\n- [entity=inserter]\n- [entity=constant-combinator], [entity=arithmetic-combinator], [entity=decider-combinator], [entity=selector-combinator]\n- [entity=pipe], [entity=pipe-to-ground], [entity=pump], [entity=storage-tank]\n- [entity=small-electric-pole], [entity=medium-electric-pole], [entity=big-electric-pole], [entity=substation]\n- [entity=solar-panel], [entity=stone-wall], [entity=gate]\n\nMaszyny wymagające [entity=maraxsis-pressure-dome]:\n- [entity=maraxsis-geothermal-generator], [entity=maraxsis-oversized-steam-turbine], [entity=boiler], [entity=steam-engine], [entity=heating-tower]\n- [entity=nuclear-reactor], [entity=heat-exchanger], [entity=heat-pipe], [entity=steam-turbine]\n- [entity=fusion-reactor], [entity=fusion-generator]\n- [entity=accumulator], [entity=beacon]\n- [entity=assembling-machine-1], [entity=assembling-machine-2], [entity=assembling-machine-3]\n- [entity=stone-furnace], [entity=steel-furnace], [entity=electric-furnace]\n- [entity=oil-refinery], [entity=centrifuge], [entity=recycler]\n- [entity=foundry], [entity=electromagnetic-plant], [entity=biochamber], [entity=cryogenic-plant]\n- [entity=lab], [entity=biolab]\n\nMaszyny, których nie można umieścić wewnątrz [entity=maraxsis-pressure-dome], ale można na dnie morskim:\n- [entity=gun-turret], [entity=laser-turret], [entity=rocket-turret], [entity=tesla-turret], [entity=railgun-turret]\n- [entity=land-mine], [entity=rocket-silo]\n- [entity=electric-mining-drill], [entity=big-mining-drill]\n\nMaszyny, które w ogóle nie działają pod wodą:\n- [entity=artillery-turret], [entity=artillery-wagon]\n- [entity=car], [entity=tank], [entity=spidertron]\n- [entity=roboport], [entity=radar], [entity=flamethrower-turret]\n\n[entity=locomotive] będzie działać pod wodą, jednak musisz użyć [entity=rail-support] budując na dnie morskim.\n[entity=train-stop] i [entity=rail-ramp] mogą być budowane tylko wewnątrz [entity=maraxsis-pressure-dome].

