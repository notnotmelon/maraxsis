[mod-name]
maraxsis=Maraxsis

[mod-description]
maraxsis=Zanurz się w niezbadanych wodach Maraxsis, świata całkowicie pokrytego bezkresnym morzem. Łodzie podwodne są niezbędnę do eksploracji planety, a światłowody przydają się do przesyłania sygnałów na duże odległości - stań się ekspertem podmorskiej logistyki! UWAGA: W głębinach nikt nie usłyszy twojego krzyku...

[space-location-name]
maraxsis=Maraxsis
maraxsis-trench=Rów oceaniczny

[space-location-description]
maraxsis=Planeta całkowicie pokryta bezkresnymi oceanami. Ciśnienie jest tu ekstremalne wysokie, więc wszystko co znajdzie się poza łodzią podwodną ulegnie implozji. Wiele maszyn działa jedynie pod powierzchnią [entity=maraxsis-pressure-dome].
maraxsis-trench=Row oceaniczny dostępny jedynie poprzez dalsze zanurzenie łodzi podwodnej w głab powierzchni Maraxsis. Światło najbliższej gwiazdy nie dociera na dno takiego rowu, a jedynym źródłem światła są sporadyczne kominy geotermalne, z których można pozyskiwać [fluid=lava] oraz [item=sulfur].

