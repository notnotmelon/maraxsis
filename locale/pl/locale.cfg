[technology-description]
cargo-landing-pad-capacity=Zaawansowane systemy sterowania rakietami pozwalają na dokładne lokalizowanie lądowiska towarowego. Każdy poziom pozwala na umieszczenie dodatkowego lądowiska towarowego.
hydraulic-science-pack=Pozwala na badanie najbardziej zaawansowanych technologii głębinowych.
maraxsis-nuclear-submarine=Zaawansowana nuklearna łódź podwodna o większej prędkości, większej siatce ekwipunku oraz większej przestrzeni magazynowej.
maraxsis-glassworking=Przezroczysty materiał używany do budowy okien oraz innych szklanych struktur. Wysoka odporność na ciśnienie sprawia, że doskonale nadaje się do wykorzystania w konstrukcjach głębinowych.
maraxsis-ooozma-confinement=Schwytaj i przetrzymuj nieuchwytne żmije z [planet=maraxsis]. Użyj ich fragmentów do badań naukowych.
maraxsis-hydro-plant=Przetwarzaj zasoloną i słonawą wodę w wodę słodką oraz kryształy soli.
maraxsis-piscary=Stwórz zrównoważone łowisko w głębinach [planet=maraxsis].
maraxsis-depth-charges=Stwórz nowy rodzaj ładunków wybuchowych.
maraxsis-sonar=Wykorzystuje fale dźwiękowe do wykrywania obiektów pod wodą. Może być również umieszczony na lądzie - ma tam bardzo duży zasięg.
maraxsis-deepsea-research=Eksperymentuj z różnymi płynami, aby tworzyć pakiety naukowe wyższej jakości.
kr-quantum-computer=Wysoce wyspecjalizowany komputer do badań głębinowych, zaprojektowany do tworzenia pakietów naukowych wyższej jakości. Wymaga dużej ilości energii.
maraxsis-project-seadragon=Wykorzystaj wyporność na swoją korzyść. Pozwala budować podwodne silosy rakietowe na [planet=maraxsis].
maraxsis-abyssal-diving-gear=Stań się samowystarczalną łodzią podwodną. Pozwala tworzyć zaawansowany sprzęt do generowania tlenu oraz przetrwania w warunkach ogromnego ciśnienia [planet=maraxsis]. Można używać wielu sprzętów nurkowych jednocześnie.
ducts=Projektuj ogromne systemy kanałów o dużej rozpiętości i podziemnym zasięgu. Wolframowe kanały mogą być umieszczane na [tile=water] oraz [tile=lava]. [entity=maraxsis-trench-duct] może przesyłać płyny bezpośrednio do [planet=maraxsis-trench].
maraxsis-liquid-atmosphere=Opracuj mrożenie [fluid=maraxsis-atmosphere] na [planet=aquilo]. Ciekła atmosfera jest sto razy gęstsza od swojego gazowego odpowiednika. Napełnianie oraz opróżnianie beczek tego płynu musi odbywać się w [entity=cryogenic-plant].
sp-spidertron-automation=Pozwala na zautomatyzowane patrole pojazdów oraz automatyczny załadunek i rozładunek łodzi podwodnych lub spidertronów w dokach. Umożliwia zautomatyzowaną logistykę przedmiotów do [planet=maraxsis-trench] poprzez użycie warunku postoju „Zanurz się”.

