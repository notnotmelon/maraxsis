[entity-description]
maraxsis-diesel-submarine=Wszechstronny okręt, którym można eksplorować głębiny oceanu. Może być kierowany za pomocą __CONTROL_MOVE__. Użyj __CONTROL__maraxsis-trench-submerge__, aby zanurzyć się w głąb rowu oceanicznego.\nMoże być zautomatyzowany, aby podążać wyznaczonymi trasami oraz autonomicznie zanurzać się w głąb rowu oceanicznego.
maraxsis-nuclear-submarine=Zaawansowana łódź podwodna o większej prędkości i przestrzeni magazynowej. Może być kierowna za pomocą __CONTROL_MOVE__. Użyj __CONTROL__maraxsis-trench-submerge__, aby zanurzyć się w głąb rowu oceanicznego.\nMoże być zautomatyzowana, aby podążać wyznaczonymi trasami oraz autonomicznie zanurzać się w głąb rowu oceanicznego.
maraxsis-hydro-plant=Wielozadaniowa jednostka do przetwarzania płynów, zbudowana do pracy pod ekstremalnym ciśnieniem. Umieść ją w rowie oceanicznym lub w kosmosie, aby uzyskać cztery dodatkowe gniazda na moduły. Może utylizować dowolny płyn.
maraxsis-pressure-dome=Ogromna konstrukcja, która chroni twoje maszyny przed wysokim ciśnieniem głębinowym. Wymaga stałej atmosfery [fluid=maraxsis-atmosphere] dla zapewnienia nadciśnienia. Płyn ten można wytworzyć za darmo w [entity=chemical-plant] na dowolnej planecie oprócz [planet=maraxsis].\nMoże zostać zdemontowana tylko wtedy, gdy w jej wenętrzu nie ma żadnych maszyn.
maraxsis-pressure-dome-collision=Ogromna konstrukcja, która chroni twoje maszyny przed wysokim ciśnieniem głębinowym. Wymaga stałej atmosfery [fluid=maraxsis-atmosphere] dla zapewnienia nadciśnienia.\nMoże zostać zdemontowana tylko wtedy, gdy w jej wnętrzu nie ma żadnych maszyn.
maraxsis-coral=Podwodny biom o wysokiej bioróżnorodności morskiej fauny i flory.
maraxsis-fishing-tower=Zautomatyzowane łowisko, które wabi i łowi ryby. Wymaga [item=maraxsis-fish-food] oraz [tile=lowland-cream-red-underwater].
maraxsis-regulator=Zużywa [fluid=maraxsis-atmosphere], aby zapewnić nadciśnienie w kopule. Sprawdź Factoriopedię, aby poznać tempo zużycia atmosfery. Po zasileniu działa jako podwodny [entity=roboport] i [entity=radar].
maraxsis-trench-duct=Niezwykle długi i wytrzymały kanał, który przesyła płyny bezpośrednio w głąb rowu oceanicznego i z powrotem.\nMusi być umieszczony na [tile=maraxsis-trench-entrance].\nWymaga [item=cliff-explosives] do oczyszczenia drogi.\nKanał ten musi być umieszczony na krawędzi wejścia do rowu oceanicznego, podobnie jak [entity=offshore-pump].
maraxsis-trench-duct-lower=Niezwykle długi i wytrzymały kanał, który przesyła płyny bezpośrednio w głąb rowu oceanicznego i z powrotem.
maraxsis-conduit=Zaawansowany radionadajnik, który może być umieszczony na dnie morskim lub na lądzie. Ma ogromny zasięg i można w nim montować moduły jakości. Efekty transmisji się kumulują, ale każdy kolejny postawiony przekaźnik zapewnia jedynie 50% mocy w stosunku do poprzedniego.
maraxsis-polylplast=Konglomerat milionów maleńkich żyjątek.
maraxsis-oversized-steam-turbine=Wysokowydajna turbina parowa. Traci 2/s [fluid=water]. [fluid=maraxsis-supercritical-steam] nie może być przesyłana w [entity=pipe], a jedynie przez [entity=maraxsis-geothermal-generator], [entity=maraxsis-oversized-steam-turbine] oraz wszystkie warianty [entity=duct-small]. Para o wyższej temperaturze zapewnia więcej energii przy zużyciu.
maraxsis-chimney=Występuje w [space-location=maraxsis-trench].

