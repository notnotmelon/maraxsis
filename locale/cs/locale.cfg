maraxsis-atmosphere=Směs plynného kyslíku a dusíku. Tato směs může být vytvořena zdarma uvnitř [entity=chemical-plant] na jakékoli planetě kromě [planet=maraxsis].
maraxsis-supercritical-steam=Přehřátá pára obsahuje hodně energie. Je vyráběná v [entity=maraxsis-geothermal-generator] a spotřebovávaná v [entity=maraxsis-oversized-steam-turbine]. Na rozdíl od běžných kapalin ji nelze dopravovat pomocí [entity=pipe]. Lze ji dopravovat pouze přes [entity=maraxsis-geothermal-generator], [entity=maraxsis-oversized-steam-turbine] a všemi varianty [entity=duct-small].
