[mod-name]
maraxsis=Maraxsis

[mod-description]
maraxsis=Пориньте у незвідані води Мараксису, світу, де море покриває все. Використовуйте підводні човни для досліджень, розгортайте волоконну оптику для передачі сигналів на великі відстані та долайте виклики глибоководної логістики. Обережно: ви не самі в глибинах..

[space-location-name]
maraxsis=Мараксис
maraxsis-trench=Жолоб

[space-location-description]
maraxsis=Планета, повністю вкрита безкрайнім океаном. Тиск тут надзвичайно великий — будь-який об'єкт буде розчавлений товщею води без захисту підводного човна. Більшість машин функціонують лише під захистом [entity=maraxsis-pressure-dome].
maraxsis-trench=Безодній жолоб, доступний лише шляхом занурення підводного човна з поверхні Мараксису. У жолобі панує суцільна темрява, єдиним джерелом світла є рідкісні геотермальні джерела, з яких можна видобувати [fluid=lava] та [item=sulfur].

