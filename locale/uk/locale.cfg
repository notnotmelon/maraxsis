[fluid-description]
maraxsis-saline-water=Вода з вмістом солі не менше 30 частин на тисячу. Розмістіть [entity=offshore-pump] будь-де на [planet=maraxsis] для видобутку солоної води.
maraxsis-brackish-water=Вода з вмістом солі не менше 1 частини на тисячу. Може бути електролізована у прісну воду.
maraxsis-atmosphere=Суміш газоподібного кисню та азоту. Цю рідину можна безкоштовно створювати всередині [entity=chemical-plant] на будь-якій планеті, крім [planet=maraxsis].
maraxsis-supercritical-steam=Пара з високою щільністю енергії, що генерується у [entity=maraxsis-geothermal-generator] та споживається у [entity=maraxsis-oversized-steam-turbine]. На відміну від звичайних рідин, не може переміщатися по [entity=pipe]. Натомість її можна переміщати лише через [entity=maraxsis-geothermal-generator], [entity=maraxsis-oversized-steam-turbine] та всі варіанти [entity=duct-small]. Пара вищої температури надає більше енергії при споживанні.

