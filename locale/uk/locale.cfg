[tips-and-tricks-item-description]
maraxsis-briefing=[planet=maraxsis] — це повністю занурений світ без жодних островів на всій поверхні. Без [entity=maraxsis-diesel-submarine] ви потонете за п'ятнадцять хвилин. Більшість машин, окрім [entity=chemical-plant] та [entity=maraxsis-hydro-plant], не розраховані на екстремальний тиск і функціонуватимуть лише всередині [entity=maraxsis-pressure-dome]. [fluid=maraxsis-saline-water] можна видобувати, розмістивши [entity=offshore-pump] будь-де. Три біоми: океанічні рівнини, кораловий риф та глибоководний жолоб. [fluid=lava] можна знайти у жолобі, однак багато інших матеріалів, таких як [fluid=maraxsis-atmosphere], [item=carbon-fiber] та [item=tungsten-plate], слід доставляти з інших планет. [entity=rocket-silo] не може запускати ракети без попереднього дослідження [technology=maraxsis-project-seadragon].
maraxsis-trench-exploration=Досліджуючи Мараксис, ви можете знайти глибоку тріщину в корі планети. Вхід до жолобу — найнижча точка на поверхні [planet=maraxsis], яку можна надійно знайти, рухаючись перпендикулярно ізолініям [entity=cliff-maraxsis]. Ця тріщина опускається на тисячі кілометрів до підводного жолобу. Перебуваючи над [tile=maraxsis-trench-entrance], використовуйте __CONTROL__maraxsis-trench-submerge__ всередині [item=maraxsis-diesel-submarine] для спуску. Глибоководний жолоб повністю темний, [item=night-vision-equipment] не функціонуватиме. Вас розчавить за тридцять секунд без захисту [item=maraxsis-diesel-submarine] або [item=maraxsis-nuclear-submarine]. [entity=maraxsis-hydro-plant] отримує чотири додаткові слоти для модулів у жолобі. [fluid=lava] можна видобувати з геотермальних джерел у жолобі та переробляти на [fluid=molten-iron], [fluid=molten-copper] та [item=sulfur].
maraxsis-underwater-machines=[entity=chemical-plant] та [entity=maraxsis-hydro-plant] герметичні та призначені для використання під тиском. Однак багато ваших машин більше не функціонують під водою на [planet=maraxsis].\n\nЗаборонені машини у [planet=maraxsis-trench]:\n- [entity=rocket-silo], [entity=cargo-landing-pad], [entity=locomotive]\n\nМашини, що функціонують під водою:\n- [entity=sp-spidertron-dock], [entity=small-lamp]\n- [entity=chemical-plant], [entity=maraxsis-hydro-plant], [entity=maraxsis-conduit]\n- [entity=transport-belt], [entity=splitter], [entity=underground-belt]\n- [entity=steel-chest], [entity=active-provider-chest], [entity=passive-provider-chest], [entity=requester-chest], [entity=buffer-chest], [entity=storage-chest]\n- [entity=inserter]\n- [entity=constant-combinator], [entity=arithmetic-combinator], [entity=decider-combinator], [entity=selector-combinator]\n- [entity=pipe], [entity=pipe-to-ground], [entity=pump], [entity=storage-tank]\n- [entity=small-electric-pole], [entity=medium-electric-pole], [entity=big-electric-pole], [entity=substation]\n- [entity=solar-panel], [entity=stone-wall], [entity=gate]\n\nМашини, що потребують [entity=maraxsis-pressure-dome]:\n- [entity=maraxsis-geothermal-generator], [entity=maraxsis-oversized-steam-turbine], [entity=boiler], [entity=steam-engine], [entity=heating-tower]\n- [entity=nuclear-reactor], [entity=heat-exchanger], [entity=heat-pipe], [entity=steam-turbine]\n- [entity=fusion-reactor], [entity=fusion-generator]\n- [entity=accumulator], [entity=beacon]\n- [entity=assembling-machine-1], [entity=assembling-machine-2], [entity=assembling-machine-3]\n- [entity=stone-furnace], [entity=steel-furnace], [entity=electric-furnace]\n- [entity=oil-refinery], [entity=centrifuge], [entity=recycler]\n- [entity=foundry], [entity=electromagnetic-plant], [entity=biochamber], [entity=cryogenic-plant]\n- [entity=lab], [entity=biolab]\n\nМашини, що не можуть бути розміщені всередині [entity=maraxsis-pressure-dome], але можуть бути розміщені на морському дні:\n- [entity=gun-turret], [entity=laser-turret], [entity=rocket-turret], [entity=tesla-turret], [entity=railgun-turret]\n- [entity=land-mine], [entity=rocket-silo]\n- [entity=electric-mining-drill], [entity=big-mining-drill]\n\nМашини, що взагалі не функціонують під водою:\n- [entity=artillery-turret], [entity=artillery-wagon]\n- [entity=car], [entity=tank], [entity=spidertron]\n- [entity=roboport], [entity=radar], [entity=flamethrower-turret]\n\n[entity=locomotive] функціонуватиме під водою, однак при будівництві на морському дні необхідно використовувати [entity=rail-support].\n[entity=train-stop] та [entity=rail-ramp] можуть бути побудовані лише всередині [entity=maraxsis-pressure-dome].

