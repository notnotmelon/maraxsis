[item-description]
hydraulic-science-pack=Використовується лабораторіями для досліджень.
sand=Дрібноподрібнений кварцовий порошок, що використовується для виготовлення скла. Розмістіть гірничий бур будь-де на [planet=maraxsis] для видобутку піску.
salt=Жах равликів.
limestone=Осадова порода, що складається зі скелетних фрагментів морських організмів.
maraxsis-glass-panes=Прозорий матеріал, що використовується для будівництва вікон та інших конструкцій. Висока стійкість до тиску.
maraxsis-ooozma-specimen=Законсервований зразок вирма з [planet=maraxsis].
maraxsis-ooozma-confinement-cell=Камера для утримання вирмів.
maraxsis-big-cliff-explosives=Абсолютна зброя для абсолютного ворога.\n[font=default-bold][color=255,230,192]Гей, ти впевнений, що ця штука безпечна?[/color][/font]
maraxsis-salt-filter=Використовується для фільтрації солі з води при високому тиску.
maraxsis-saturated-salt-filter=Насичений фільтр, що потребує очищення.
maraxsis-coral=Підводний організм, що утворює великі колонії. Видобувається з [entity=maraxsis-coral].
maraxsis-microplastics=Огидно! Що це взагалі таке?
maraxsis-super-sealant-substance=Захищає від води та тиску.
maraxsis-fat-man=Хай грянуть громи! Далекобійний ядерний артилерійський снаряд.

