[technology-description]
cargo-landing-pad-capacity=Сучасні системи управління ракетою дозволяють точно відстежувати вантажний посадковий майданчик. Кожен рівень дозволяє розмістити один додатковий вантажний посадковий майданчик.
hydraulic-science-pack=Дозволяє досліджувати найсучасніші глибоководні технології.
maraxsis-nuclear-submarine=Удосконалений атомний підводний човен з вищою швидкістю, більшою сіткою обладнання та більшим вантажним відсіком.
maraxsis-glassworking=Прозорий матеріал, що використовується для будівництва вікон та інших конструкцій. Завдяки надзвичайній міцності на стиск може використовуватися у глибоководному будівництві.
maraxsis-ooozma-confinement=Захоплення та утримання невловимих вирмів [planet=maraxsis]. Використовуйте їх зразки для наукових досліджень.
maraxsis-hydro-plant=Переробка солоної та солонуватої води у прісну воду та кристалічну сіль.
maraxsis-piscary=Створіть стале рибальство у глибинах [planet=maraxsis].
maraxsis-depth-charges=Створення нового покоління вибухової зброї.
maraxsis-sonar=Використовує звукові хвилі для виявлення об'єктів під водою. Також може бути розміщений на суші для забезпечення величезного радіусу покриття.
maraxsis-deepsea-research=Експериментуйте з різними рідинами для створення науково-дослідних пакетів вищої якості.
kr-quantum-computer=Вузькоспеціалізований глибоководний дослідницький комп'ютер, розроблений для створення науково-дослідних пакетів вищої якості. Потребує великої кількості енергії.
maraxsis-project-seadragon=Використовуйте плавучість на свою користь. Дозволяє будувати ракетні шахти під водою на [planet=maraxsis].
maraxsis-abyssal-diving-gear=Стань підводним човном! Винайдіть сучасне обладнання для генерації кисню та виживання під тиском [planet=maraxsis]. Усі ефекти складаються при використанні кількох предметів спорядження.
ducts=Проектуйте величезні трубопровідні системи великої протяжності та підземної відстані. Вольфрамові трубопроводи можуть бути розміщені на [tile=water] та [tile=lava]. [entity=maraxsis-trench-duct] може передавати рідини безпосередньо до [planet=maraxsis-trench].
maraxsis-liquid-atmosphere=Розробіть кріогенне заморожування [fluid=maraxsis-atmosphere] на [planet=aquilo]. Рідка атмосфера у сто разів щільніша за газоподібну. Наповнення та спустошення бочок цією рідиною повинно здійснюватися всередині [entity=cryogenic-plant].
sp-spidertron-automation=Вмикає автоматичне патрулювання та автоматичне завантаження й розвантаження підводних човнів або павукотронів у доках. Вмикає автоматичну логістику предметів до [planet=maraxsis-trench] за допомогою умови очікування "Занурення".

