[entity-description]
maraxsis-diesel-submarine=Універсальний транспортний засіб, здатний досліджувати глибини океану. Керується за допомогою __CONTROL_MOVE__. Використовуйте __CONTROL__maraxsis-trench-submerge__ для спуску до жолобу.\nМоже бути автоматизований для проходження маршрутів та автоматичного спуску до жолобу.
maraxsis-nuclear-submarine=Удосконалений атомний підводний човен з вищою швидкістю та більшим вантажним відсіком. Керується за допомогою __CONTROL_MOVE__. Використовуйте __CONTROL__maraxsis-trench-submerge__ для спуску до жолобу.\nМоже бути автоматизований для проходження маршрутів та автоматичного спуску до жолобу.
maraxsis-hydro-plant=Багатофункціональний вузол обробки рідин, розрахований на роботу при екстремальному тиску. Розмістіть у глибоководному жолобі або у космосі для отримання чотирьох додаткових слотів для модулів. Може видаляти будь-яку рідину.
maraxsis-pressure-dome=Величезна конструкція, що захищає ваші машини від тиску глибокого океану. Потребує постійної подачі [fluid=maraxsis-atmosphere] для створення надлишкового тиску. Цю рідину можна безкоштовно виробляти у [entity=chemical-plant] на будь-якій планеті, крім [planet=maraxsis].\nДемонтаж можливий лише за відсутності машин усередині купола.
maraxsis-pressure-dome-collision=Величезна конструкція, що захищає ваші машини від тиску глибокого океану. Потребує постійної подачі [fluid=maraxsis-atmosphere] для створення надлишкового тиску.\nДемонтаж можливий лише за відсутності машин усередині купола.
maraxsis-coral=Підводний біом з високим різноманіттям морського життя.
maraxsis-fishing-tower=Автоматизована рибальська установка, що приваблює та виловлює рибу. Потребує [item=maraxsis-fish-food] та [tile=lowland-cream-red-underwater].
maraxsis-regulator=Споживає [fluid=maraxsis-atmosphere] для забезпечення нормального тиску у куполі. Дивіться Факторіопедію для отримання інформації про швидкість споживання атмосфери. При наявності живлення функціонує як підводний [entity=roboport] та [entity=radar].
maraxsis-trench-duct=Надзвичайно довгий та міцний трубопровід, що передає рідини безпосередньо до жолобу та назад.\nМає бути розміщений на [tile=maraxsis-trench-entrance].\nПотребує [item=cliff-explosives] для розчищення шляху.\nЦей трубопровід необхідно розміщувати на краю входу до жолобу, аналогічно [entity=offshore-pump].
maraxsis-trench-duct-lower=Надзвичайно довгий та міцний трубопровід, що передає рідини безпосередньо до жолобу та назад.
maraxsis-conduit=Сучасний маяк, який можна розміщувати на морському дні або на суші. Має величезний радіус дії та може приймати модулі якості. Кожен наступний встановлений кондуїт забезпечує лише половину ефективності розподілу від попереднього.
maraxsis-polylplast=Скупчення мільйонів крихітних тварин.
maraxsis-oversized-steam-turbine=Високоефективна регенеративна парова турбіна. Витрачає 2/с [fluid=water]. [fluid=maraxsis-supercritical-steam] не можна переміщати по [entity=pipe], лише через [entity=maraxsis-geothermal-generator], [entity=maraxsis-oversized-steam-turbine] та всі варіанти [entity=duct-small]. Пара вищої температури надає більше енергії при споживанні.
maraxsis-chimney=Знаходиться у [space-location=maraxsis-trench].

[quality-tooltip]
atmosphere-consumption=Зменшує споживання [fluid=maraxsis-atmosphere] при вищій якості.

